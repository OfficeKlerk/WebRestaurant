<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cart-page.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Корзина</title>
</head>
<body>
    <script src="cart-page.js"></script>

    <!-- шапка -->
    <header>
        <div class="side-button" id="left-button" onclick="goBack()">
            <a href="#">
                <span class="side-button-icon"><i class="fas fa-circle-arrow-left"></i></span>
                <span class="side-button-text" id="left-text">Назад</span>
            </a>
        </div>

        <h1>Корзина</h1>

        <div class="side-button" id="right-button">
            <a href="../index/index.html">
                <span class="side-button-icon"><i class="fas fa-house"></i></span>
                <span class="side-button-text" id="right-text">Главная</span>
            </a>
        </div>
    </header>

    <!-- содержимое корзины-->
    <main id="main">
        <!-- сюда динамично добавляются элементы -->
    </main>

    <!-- кнопки -->
    <div class="buttons">
        <button class="clear-button" onclick="clearCart()">Очистить корзину</button>
        <button class="submit-button">Оформить заказ</button>
    </div>

    <!-- футер -->
    <footer>
        <div class="logo">
            <img src="images/restaurant-logo.png" alt="logo">
            <div class="restaurant-name">Тбилисский дворик</div>
        </div>

        <div class="author">Made by Leon Slobodyan</div>
    </footer>

</body>
</html>
